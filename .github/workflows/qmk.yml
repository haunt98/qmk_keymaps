# https://github.com/qmk/qmk_firmware/blob/master/docs/newbs_building_firmware_workflow.md
name: QMK
on:
  push:
    branches:
      - main
    paths:
      - "**.c"
      - "**.h"
      - "**.mk"
  pull_request:
    branches:
      - main
    paths:
      - "**.c"
      - "**.h"
      - "**.mk"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli
    strategy:
      matrix:
        qmk_ref: [master]
    steps:
      - name: Disable git safe directory checks
        run: git config --global --add safe.directory '*'
      - name: Checkout QMK
        uses: actions/checkout@v6
        with:
          repository: qmk/qmk_firmware
          submodules: recursive
          ref: ${{ matrix.qmk_ref }}
      - name: Checkout personal keymaps
        uses: actions/checkout@v6
        with:
          path: haunt98_qmk_keymaps
      - name: Copy keymaps
        run: |
          cp -rf haunt98_qmk_keymaps/users/haunt98 users/
          cp -rf haunt98_qmk_keymaps/hineybush_h60/keymaps/haunt98 keyboards/hineybush/h60/keymaps/
          cp -rf haunt98_qmk_keymaps/sofle_rev1/keymaps/haunt98 keyboards/sofle/keymaps/
          cp -rf haunt98_qmk_keymaps/crkbd_rev1/keymaps/haunt98 keyboards/crkbd/keymaps/
          cp -rf haunt98_qmk_keymaps/coban_pad9a/keymaps/haunt98 keyboards/coban/pad9a/keymaps/
      - name: Build firmware
        run: |
          make hineybush/h60:haunt98
          make sofle/rev1:haunt98
          make crkbd/rev1:haunt98
          make coban/pad9a:haunt98
      - name: Extra
        run: |
          qmk info -m -l -kb hineybush/h60 -km haunt98
          qmk info -m -l -kb sofle/rev1 -km haunt98
      - name: Archive firmware
        uses: actions/upload-artifact@v7
        with:
          name: haunt98_firmware_${{ matrix.qmk_ref }}
          path: |
            *.hex
            *.uf2
